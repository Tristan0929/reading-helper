<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外刊阅读助手 · 深度英文精析</title>
    <!-- markdown-it + 脚注插件 -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.2/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote@3.0.3/dist/markdown-it-footnote.min.js"></script>
    <style>
        :root {
            --bg: #f5f3f0;
            --card: #ffffff;
            --text: #2c2c2c;
            --muted: #6b6b6b;
            --border: #e0ded9;
            --accent: #1a1a1a;
            --accent-hover: #3a3a3a;
            --radius: 16px;
            --shadow: 0 8px 30px rgba(0,0,0,0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 820px;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        /* 头部区域 */
        .header {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--accent);
            margin-bottom: 0.4rem;
        }

        .header .subtitle {
            font-size: 0.95rem;
            color: var(--muted);
        }

        /* 使用说明卡片 */
        .guide {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.8rem 2rem;
            border: 1px solid var(--border);
        }

        .guide h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .steps {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .step {
            flex: 1 1 180px;
            display: flex;
            gap: 0.8rem;
            align-items: flex-start;
        }

        .step-number {
            width: 28px;
            height: 28px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .step-content {
            font-size: 0.9rem;
            color: var(--text);
        }

        .step-content strong {
            display: block;
            margin-bottom: 0.2rem;
            font-weight: 600;
        }

        /* 输入卡片 */
        .input-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2rem;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="password"],
        textarea {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            background: #fafaf9;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
        }

        input[type="password"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,0,0,0.03);
        }

        textarea {
            resize: vertical;
            min-height: 180px;
        }

        .btn-primary {
            align-self: flex-start;
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            letter-spacing: 0.3px;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* 结果区域 */
        #result {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2rem;
            border: 1px solid var(--border);
            line-height: 1.7;
            display: none;
            overflow-wrap: break-word;
        }

        /* ──────────────── 以下为结果内部排版美化 ──────────────── */

        /* 二级标题：板块之间有明显间隔 */
        #result h2 {
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid #e0ded9;
            font-weight: 600;
            color: #1a1a1a;
        }

        /* 三级标题：句子赏析中的每个句子标题 */
        #result h3 {
            margin-top: 1.8rem;
            margin-bottom: 0.5rem;
        }

        /* 段落间距 */
        #result p {
            margin-bottom: 1rem;
            line-height: 1.7;
        }

        /* ──────────────── 脚注美化（卡片式） ──────────────── */
        .footnotes {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid #ddd;
        }

        .footnotes ol {
            list-style: none;
            padding-left: 0;
        }

        .footnotes li {
            background: #fafaf9;
            border: 1px solid #eae7e2;
            border-radius: 10px;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
            transition: background 0.2s;
        }

        .footnotes li:hover {
            background: #f5f3f0;
        }

        .footnotes li p {
            margin: 0;
            line-height: 1.6;
        }

        .footnote-ref {
            text-decoration: none;
            color: #444;
            font-weight: 500;
        }

        /* 操作按钮容器 */
        .action-bar {
            display: flex;
            gap: 0.8rem;
            justify-content: flex-end;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease;
            font-weight: 500;
        }

        .btn-secondary:hover {
            background: #f5f5f5;
            border-color: #ccc;
        }

        /* 加载提示 */
        #loading {
            text-align: center;
            color: var(--muted);
            font-size: 0.9rem;
            padding: 1rem;
        }

        /* ──────────────── 打印样式 ──────────────── */
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .container > *:not(#result) {
                display: none !important;
            }
            #result {
                display: block !important;
                box-shadow: none;
                border: none;
                padding: 0;
                margin: 0;
                max-width: 100%;
            }
            .action-bar, .no-print {
                display: none !important;
            }
            @page { margin: 1.8cm; }
            .footnote-ref, .footnote-backref {
                text-decoration: underline;
            }

            /* 加粗 → 红色粗体 */
            strong { color: red; }
            /* 斜体 → 蓝色斜体 */
            em { color: blue; font-style: italic; }

            /* 打印时脚注卡片简化 */
            .footnotes li {
                background: none;
                border: 1px solid #ccc;
                padding: 0.8rem 1rem;
                margin-bottom: 0.8rem;
                break-inside: avoid;
            }
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .steps {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>📖 外刊阅读助手</h1>
            <p class="subtitle">深度拆解英文好词好句，一键导出 Markdown 与 PDF</p>
        </div>

        <!-- 使用说明 -->
        <div class="guide">
            <h2>⚡ 三步开始</h2>
            <div class="steps">
                <div class="step">
                    <span class="step-number">1</span>
                    <div class="step-content">
                        <strong>准备文章</strong>
                        将外刊文章粘贴到下方文本框。建议先在 DeepSeek 官网聊天中让 AI 帮你整理格式，再粘贴至此。
                    </div>
                </div>
                <div class="step">
                    <span class="step-number">2</span>
                    <div class="step-content">
                        <strong>输入 Key</strong>
                        填写你的 <a href="https://platform.deepseek.com/api_keys" target="_blank">DeepSeek API Key</a>，点击分析。
                    </div>
                </div>
                <div class="step">
                    <span class="step-number">3</span>
                    <div class="step-content">
                        <strong>导出笔记</strong>
                        分析完成后，可一键「复制 Markdown」粘贴到 Obsidian，或「导出 PDF」保存（PDF 内脚注可点击跳转）。
                    </div>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-card">
            <div class="input-group">
                <label for="apiKeyInput">🔑 DeepSeek API Key</label>
                <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off" />
            </div>
            <div class="input-group">
                <label for="articleInput">📄 外刊文章</label>
                <textarea id="articleInput" placeholder="在此粘贴排版后的英文文章..."></textarea>
            </div>
            <button class="btn-primary" onclick="analyze()">🚀 开始分析</button>
        </div>

        <!-- 加载状态 -->
        <div id="loading" style="display:none;">⏳ 正在深度分析中，请稍候...</div>

        <!-- 结果展示区 -->
        <div id="result"></div>
    </div>

    <script>
        const md = window.markdownit({
            html: true,
            breaks: true,
            linkify: true,
            typographer: false
        }).use(window.markdownitFootnote);

        let lastMarkdown = '';

        window.onload = function() {
            const savedKey = localStorage.getItem('apiKey');
            if (savedKey) document.getElementById('apiKeyInput').value = savedKey;
        };

        function getApiKey() { return document.getElementById('apiKeyInput').value.trim(); }
        function saveApiKey(key) { localStorage.setItem('apiKey', key); }

        async function analyze() {
            const apiKey = getApiKey();
            if (!apiKey) return alert('请输入 API Key');
            saveApiKey(apiKey);
            const article = document.getElementById('articleInput').value.trim();
            if (!article) return alert('请先粘贴文章');

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            document.getElementById('result').innerHTML = '';

            try {
                const resp = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ article: article, api_key: apiKey })
                });
                const data = await resp.json();
                if (data.error) {
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('result').innerHTML = `<p style="color:red;">错误：${data.error}</p>`;
                } else {
                    lastMarkdown = data.result;
                    const html = md.render(data.result);
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('result').innerHTML = `
                        <div class="action-bar no-print">
                            <button class="btn-secondary" onclick="copyResult()">📋 复制 Markdown</button>
                            <button class="btn-secondary" onclick="exportPDF()">🖨️ 导出 PDF</button>
                        </div>
                        ${html}
                    `;
                }
            } catch (e) {
                document.getElementById('result').style.display = 'block';
                document.getElementById('result').innerHTML = `<p style="color:red;">请求失败：${e.message}</p>`;
            }
            document.getElementById('loading').style.display = 'none';
        }

        function copyResult() {
            if (!lastMarkdown) return alert('没有可复制的分析结果');
            navigator.clipboard.writeText(lastMarkdown).then(() => {
                alert('✅ Markdown 格式已复制，可直接粘贴到 Obsidian');
            }).catch(() => alert('复制失败，请手动复制'));
        }

        function exportPDF() {
            window.print();
        }
    </script>
</body>
</html>
